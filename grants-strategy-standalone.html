  function buildDotChart() {
    var subDeals = GOVSPEND.filter(function (r) {
      return r.cat === "sub" || r.cat === "both";
    });
    var vendorGroups = {};
    subDeals.forEach(function (r) {
      if (!vendorGroups[r.vendor]) vendorGroups[r.vendor] = [];
      vendorGroups[r.vendor].push(r.amount);
    });
    var flat = Object.values(vendorGroups).reduce(function (a, b) {
      return a.concat(b);
    }, []);
    var chartMax = Math.max.apply(null, flat);
    var entries = Object.entries(vendorGroups).sort(function (a, b) {
      return median(b[1]) - median(a[1]);
    });
    var rows = entries
      .map(function (pair) {
        var vendor = pair[0];
        var amounts = pair[1];
        var med = median(amounts);
        var medPct = Math.round((med / chartMax) * 100);
        var deals = subDeals.filter(function (r) {
          return r.vendor === vendor;
        });
        var dots = amounts
          .map(function (a, i) {
            var pct = Math.round((a / chartMax) * 100);
            var deal = deals[i];
            var dotColor =
              deal && deal.cat === "impl"
                ? "#185FA5"
                : deal && deal.cat === "both"
                  ? "#533AB7"
                  : deal && deal.cat === "addon"
                    ? "#B7791F"
                    : "#1A6B5A";
            var title =
              fmt(a) +
              " — " +
              (deal && deal.cat === "impl"
                ? "Implementation"
                : deal && deal.cat === "both"
                  ? "Sub + Impl"
                  : deal && deal.cat === "addon"
                    ? "Add-on"
                    : "Subscription") +
              " — " +
              (deal ? escapeHtml(deal.agency) : "");
            return (
              '<div title="' +
              title +
              '" style="position:absolute;left:' +
              pct +
              "%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:' +
              dotColor +
              ';opacity:0.8"></div>'
            );
          })
          .join("");
        return (
          '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
          '<span style="font-size:10px;width:130px;flex-shrink:0;color:var(--cts);text-align:right">' +
          escapeHtml(vendor) +
          "</span>" +
          '<div style="flex:1;position:relative;height:24px">' +
          '<div style="position:absolute;left:' +
          medPct +
          "%;top:0;bottom:0;width:2px;background:" +
          vColor(vendor) +
          ';opacity:0.4;border-radius:1px"></div>' +
          dots +
          "</div>" +
          '<span style="font-size:11px;font-weight:500;width:70px;text-align:right;flex-shrink:0">med ' +
          fmt(med) +
          "</span>" +
          '<span style="font-size:10px;color:var(--ctt);width:40px;text-align:right;flex-shrink:0">' +
          amounts.length +
          " POs</span></div>"
        );
      })
      .join("");
    return (
      '<div class="card pad">' +
      '<p class="lbl">Annual subscription PO amounts by vendor (each dot = one deal)</p>' +
      rows +
      '<div style="display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:10px;border-top:0.5px solid var(--cb)">' +
      '<span style="width:130px;flex-shrink:0"></span>' +
      '<div style="flex:1;display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--ctt)">← $0 (annual PO amount)</span>' +
      '<span style="font-size:10px;color:var(--ctt)">' +
      fmt(chartMax) +
      " →</span></div><span style=\"width:110px;flex-shrink:0\"></span></div>" +
      '<div style="display:flex;align-items:center;gap:16px;margin-top:10px;flex-wrap:wrap">' +
      '<span style="font-size:10px;color:var(--ctt)">Each dot = one PO:</span>' +
      '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:#1A6B5A;opacity:0.75"></div>' +

      .map(function (tier) {
        return (
          '<div style="padding:18px 20px;background:var(--cbg);border:1px solid ' +
          tier.color +
          ';border-radius:10px">' +
          '<p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:' +
          tier.color +
          ';margin:0 0 4px">' +
          escapeHtml(tier.tag) +
          "</p>" +
          '<p style="font-size:14px;font-weight:500;margin:0 0 12px">' +
          escapeHtml(tier.opengov) +
          "</p>" +
          '<div style="font-size:24px;font-weight:500;color:' +
          tier.color +
          ';margin:0 0 4px">' +
          escapeHtml(tier.pricing.label) +
          "</div>" +
          '<p style="font-size:11px;color:var(--cts);margin:0 0 12px">Implementation: ' +
          escapeHtml(tier.implFee) +
          " (fixed)</p>" +
          '<div style="padding:8px 10px;background:' +
          tier.bg +
          ';border-radius:6px;margin-bottom:10px">' +
          '<p style="font-size:10px;color:' +
          tier.color +
          ';font-weight:600;margin:0 0 3px;text-transform:uppercase;letter-spacing:0.5px">Competitor benchmark</p>' +
          '<p style="font-size:11px;color:var(--cts);margin:0;line-height:1.5">' +
          escapeHtml(tier.competitorBenchmark) +
          "</p></div>" +
          '<p style="font-size:10px;color:var(--ctt);margin:0;font-style:italic">' +
          escapeHtml(tier.insight) +
          "</p></div>"
        );
      })
      .join("");

    var compareRows = PRICING_COMPARE.map(function (r, i) {
      return (
        '<tr style="border-bottom:0.5px solid var(--cb);background:' +
        (i === 0 ? r.bg : i % 2 === 0 ? "transparent" : "var(--cbs)") +
        '">' +
        '<td style="padding:8px 14px"><span style="font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;background:' +
        r.bg +
        ";color:" +
        r.color +
        '">' +
        escapeHtml(r.name) +
        "</span></td>" +
        '<td style="padding:8px 12px;text-align:right;font-weight:' +
        (i === 0 ? "500" : "400") +
        '">' +
        escapeHtml(r.entry) +
        "</td>" +
        '<td style="padding:8px 12px;text-align:right;font-weight:' +
        (i === 0 ? "500" : "400") +
        '">' +
        escapeHtml(r.mid) +
        "</td>" +
        '<td style="padding:8px 12px;text-align:right;font-weight:' +
        (i === 0 ? "500" : "400") +
        '">' +
        escapeHtml(r.ent) +
        "</td>" +
        '<td style="padding:8px 12px;text-align:right;color:' +
        (i === 0 ? r.color : "var(--cts)") +
        ";font-weight:" +
        (i === 0 ? "500" : "400") +
        '">' +
        escapeHtml(r.impl) +
        "</td></tr>"
      );
    }).join("");

    var recHtml = RECS.map(function (r) {
      return (
        '<div style="padding:12px 16px;background:var(--cbg);border:0.5px solid var(--cbd);border-radius:8px">' +
        '<p style="font-size:13px;font-weight:500;margin:0 0 6px">' +
        escapeHtml(r.n) +
        ". " +
        escapeHtml(r.title) +
        "</p>" +
        '<p style="font-size:12px;color:var(--cts);margin:0;line-height:1.6">' +
        escapeHtml(r.body) +
        "</p></div>"
      );
    }).join("");

    return (
      '<div style="background:var(--cbs);border-radius:8px;padding:12px 16px;margin-bottom:20px">' +
      '<p style="font-size:12px;color:var(--cts);margin:0;line-height:1.6">Recommended pricing anchors — derived from GovSpend actuals for each tier\'s ICP segment. The core principle: <strong>undercut AmpliFund subscription price by 15–30% at Essentials, match at Advanced, and win on platform value at Strategic.</strong> Fixed implementation fees are a competitive weapon — use them aggressively in proposals.</p></div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:24px">' +
      cards +
      "</div>" +
      '<p class="sec">OpenGov vs competitor pricing — by tier (median subscription)</p>' +
      '<div class="card" style="overflow:hidden;margin-bottom:20px"><div style="overflow-x:auto"><table class="tbl">' +
      "<thead><tr style=\"border-bottom:0.5px solid var(--cb);background:var(--cbs)\">" +
      '<th style="padding:8px 14px;text-align:left;font-weight:500;color:var(--cts)">Vendor</th>' +
      '<th style="padding:8px 12px;text-align:right;font-weight:500;color:var(--cts)">Entry / Small</th>' +
      '<th style="padding:8px 12px;text-align:right;font-weight:500;color:var(--cts)">Mid-market</th>' +
      '<th style="padding:8px 12px;text-align:right;font-weight:500;color:var(--cts)">Enterprise</th>' +
      '<th style="padding:8px 12px;text-align:right;font-weight:500;color:var(--cts)">Impl model</th>' +
      "</tr></thead><tbody>" +
      compareRows +
      "</tbody></table></div></div>" +
      '<p class="sec">Key pricing recommendations</p>' +
      '<div style="display:flex;flex-direction:column;gap:8px">' +
      recHtml +
      "</div>"
    );
  }

  function render() {
    var nav = TABS.map(function (t, i) {
      return (
        '<button type="button" data-tab-index="' +
        i +
        '" class="tab-btn' +
        (state.tab === i ? " active" : "") +
        '">' +
        escapeHtml(t) +
        "</button>"
      );
    }).join("");

    var tab0 =
      '<p class="sec">Real-world subscription pricing — from live GovSpend purchase orders (last 12 months)</p>' +
      '<figure class="card" style="margin:0 0 18px;padding:12px 14px 14px;overflow:hidden">' +
      MARKET_SVG +
      '<figcaption style="font-size:10px;color:var(--ctt);padding:8px 4px 0;line-height:1.45">Built-in market snapshot (illustrative). Quantitative detail is in the chart and table below.</figcaption></figure>' +
      buildDotChart() +
      '<p class="sec" style="margin-top:1rem">Competitor profiles — click to expand</p>' +
      '<div id="comp-wrap" style="display:flex;flex-direction:column;gap:8px">' +
      buildCompetitors() +
      "</div>" +
      '<p class="sec">All GovSpend software POs (last 12 months)</p>' +
      '<div class="card" style="overflow:hidden"><div style="overflow-x:auto"><table class="tbl">' +
      "<thead><tr style=\"border-bottom:0.5px solid var(--cb);background:var(--cbs)\">" +
      ["Vendor", "Agency", "State", "Type", "Amount", "Date", "Category", "Description"]
        .map(function (h) {
          return (
            '<th style="padding:8px 10px;text-align:' +
            (h === "Amount" ? "right" : "left") +
            ';font-weight:500;color:var(--cts);white-space:nowrap">' +
            h +
            "</th>"
          );
        })
        .join("") +
      "</tr></thead><tbody>" +
      buildGovTable() +
      "</tbody></table></div></div>";

    var tab1 =
      '<div style="background:var(--cbs);border-radius:8px;padding:12px 16px;margin-bottom:16px">' +
      '<p style="font-size:12px;font-weight:500;margin:0 0 4px">Verdict on your CMM framework</p>' +
      '<p style="font-size:12px;color:var(--cts);margin:0;line-height:1.6">Your 5-level CMM is structurally sound and well-grounded in how government grants teams actually mature. Levels 1–2 accurately describe the status quo (Gong calls confirm this universally — spreadsheets, yellow folders, Tyler modules). Levels 3–5 map cleanly onto Essentials / Advanced / Strategic.</p></div>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' +
      buildCmmTiers() +
      "</div>" +
      '<p class="sec">Feature differentiation by tier</p>' +
      '<div class="card" style="overflow:hidden"><div style="overflow-x:auto"><table class="tbl">' +
      "<thead><tr style=\"border-bottom:0.5px solid var(--cb)\">" +
      '<th style="padding:8px 14px;text-align:left;background:var(--cbs);color:var(--cts);font-weight:500">Capability</th>' +
      ["Essentials", "Advanced", "Strategic"]
        .map(function (t, i) {
          var c = CMM[i + 2];
          return (
            '<th style="padding:8px 12px;text-align:center;background:var(--cbs)">' +
            '<span style="font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;background:' +
            c.bg +
            ";color:" +
            c.color +
            '">' +
            t +
            "</span></th>"
          );
        })
        .join("") +
      "</tr></thead><tbody>" +
      buildFeatureTable() +
      "</tbody></table></div></div>";

    var tab2 =
      '<div style="background:var(--cbs);border-radius:8px;padding:12px 16px;margin-bottom:16px">' +
      '<p style="font-size:12px;color:var(--cts);margin:0;line-height:1.6">Six evidence-backed win themes, each grounded in GovSpend data or Gong call transcripts.</p></div>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' +
      buildWinThemes() +
      "</div>";

    var tab3 = buildPricingArch();

    var panels = [tab0, tab1, tab2, tab3]
      .map(function (html, i) {
        return '<div class="tab-panel" data-panel="' + i + '" ' + (i === state.tab ? "" : 'hidden=""') + ">" + html + "</div>";
      })
      .join("");

    document.getElementById("app").innerHTML =
      '<header style="margin-bottom:1.25rem">' +
      '<p style="font-size:11px;color:var(--ctt);text-transform:uppercase;letter-spacing:0.5px;margin:0 0 4px">OpenGov Grants Management · Competitive Strategy · GovSpend + Gong + Market Research</p>' +
      '<h1 style="font-size:20px;font-weight:500;margin:0 0 4px">Grants Management: Pricing, Packaging & Competitive Differentiation</h1>' +
      '<p style="font-size:12px;color:var(--cts);margin:0">Based on 59 live GovSpend POs (last 12 months), Gong call analysis, and the CMM framework — with independent verification and recommendations.</p></header>' +
      '<nav class="tab-nav">' +
      nav +
      "</nav>" +
      '<p style="font-size:11px;color:var(--ctt);margin:0 0 12px;padding:0 4px">This page is a single HTML file — safe to host on Vercel as static (<strong>Upload</strong> or drop into a repo as <code>index.html</code>).</p>' +
      panels;
  }

  document.addEventListener("DOMContentLoaded", function () {
    render();
    document.getElementById("app").addEventListener("click", function (e) {
      var tabBtn = e.target.closest("[data-tab-index]");
      if (tabBtn) {
        state.tab = +tabBtn.getAttribute("data-tab-index");
        state.selectedComp = null;
        render();
        return;
      }
      var comp = e.target.closest("[data-comp-name]");
      if (comp && comp.classList.contains("comp-card")) {
        var name = comp.getAttribute("data-comp-name");
        state.selectedComp = state.selectedComp === name ? null : name;
        render();
      }
    });
  });
})();

  </script>
</body>
</html>
